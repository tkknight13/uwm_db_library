{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Welcome Back</title>
    <link rel="stylesheet" href="{% static 'css/user-styles.css' %}">
</head>
<body>
    <div class="header">

        <ul>
            <li><a href="{% url 'home' %}">Home</a></li>
            <li><a href="{% url 'view_books' %}">View Books</a></li>
            <li><a href="{% url 'logout' %}">Log Out</a></li>
        </ul>
    </div>
<h1> Lib Database plz</h1>
<h2>Your Checked Out Books</h2>

{% for item in borrowed_books %}
    <p>
        {{ item.book.title }} by {{ item.book.author }}
    </p>
{% empty %}
    <p>You have no books checked out.</p>
{% endfor %}

</body>
</html>
